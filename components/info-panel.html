<!-- Controls Info Panel -->
    <div id="info-panel">
      <div id="info-header">
        <h3>Điều khiển</h3>
        <button id="toggle-info">Ẩn</button>
      </div>
      <div id="info-content">
        <p><b>W/A/S/D:</b> Di chuyển</p>
        <p><b>Chuột:</b> Xoay góc nhìn</p>
        <p><b>Click:</b> Chi tiết tranh</p>
        <p><b class="key-inspect-label">T:</b> Xem chuyện lịch sử</p>
        <p><b class="key-lights-label">L:</b> Bật/tắt đèn</p>
        <p><b class="key-audio-label">K:</b> Bật/tắt nhạc</p>
        <p><b class="key-menu-label">M:</b> Menu chính</p>
        <p><b class="key-sprint-label">Shift:</b> Tăng tốc (Chạy)</p>
        <p><b>Space:</b> Khóa chuột</p>
      </div>
    </div>
